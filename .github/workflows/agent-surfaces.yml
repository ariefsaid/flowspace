name: Agent Surfaces

# Keeps the .codex/agents mirrors in sync with the .claude/agents source of truth
# (generated by scripts/sync-agent-surfaces.mjs). Fails the PR if a mirror drifted.

on:
  pull_request:
    paths:
      - '.claude/agents/**'
      - '.codex/agents/**'
      - 'scripts/sync-agent-surfaces.mjs'
      - 'scripts/sync-agent-surfaces.test.mjs'
      - '.github/workflows/agent-surfaces.yml'
  push:
    branches: [main]
    paths:
      - '.claude/agents/**'
      - '.codex/agents/**'
      - 'scripts/sync-agent-surfaces.mjs'
      - 'scripts/sync-agent-surfaces.test.mjs'
      - '.github/workflows/agent-surfaces.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: agent-surfaces-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Unit tests for the sync script
        run: node --test scripts/sync-agent-surfaces.test.mjs
      - name: Verify .codex mirrors are in sync with .claude/agents
        run: node scripts/sync-agent-surfaces.mjs --check
