name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'review/**'
      - '.claude/**'
      - '.codex/**'
      - '**/*.md'
      - '.gitignore'
      - 'AGENTS.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'review/**'
      - '.claude/**'
      - '.codex/**'
      - '**/*.md'
      - '.gitignore'
      - 'AGENTS.md'
      - 'LICENSE'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lightweight gate: type, lint, unit, build. No DB / Supabase stack needed.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint:ci
      - run: pnpm test:unit
      - run: pnpm build

  # Integration + e2e against the Supabase CLI local stack (Docker on the runner).
  # `supabase start` auto-applies EVERY supabase/migrations/*.sql in filename
  # order at DB init, so the full schema — app DDL (0000_app_schema) + auth-link
  # FK + RLS + Storage (ADR-0015 §2, revised) — is provisioned by start ALONE.
  # drizzle-orm remains the query layer; drizzle-kit is no longer the DDL
  # authority and is not run in CI.
  integration-and-e2e:
    runs-on: ubuntu-latest
    env:
      # Local Supabase CLI demo values (non-secret JWTs printed by `supabase status`;
      # identical on every local stack — safe to commit; prod supplies real values).
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:64321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:64322/postgres
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:64322/postgres
      AUTH_TRUST_HOST: 'true'
      SEED_ORG_SLUG: flowspace
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # `supabase start` provisions the entire schema by applying
      # supabase/migrations/*.sql (0000_app_schema → 0001-0004) in order on a
      # fresh DB. No drizzle/apply step: migrations own the DDL now.
      - name: Start Supabase local stack (applies all migrations, fresh)
        run: pnpm exec supabase start
        timeout-minutes: 10

      # Integration tests are hermetic: they seed+truncate their own rows in
      # beforeAll/afterAll, so they run against the schema-only DB (start). They
      # MUST run before `db:seed:supabase` — their afterAll truncates
      # app_users/organizations and would otherwise wipe the e2e seed.
      - name: Integration tests (real Supabase stack)
        run: pnpm test:int

      - name: Seed (org + 3 auth/app users) for build + e2e
        run: pnpm db:seed:supabase

      - name: Build (the Playwright webServer runs `pnpm start`)
        run: pnpm build

      - run: pnpm exec playwright install --with-deps chromium
      - name: e2e (Playwright)
        run: pnpm e2e
