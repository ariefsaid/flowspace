name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'review/**'
      - '.claude/**'
      - '.codex/**'
      - '**/*.md'
      - '.gitignore'
      - 'AGENTS.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'review/**'
      - '.claude/**'
      - '.codex/**'
      - '**/*.md'
      - '.gitignore'
      - 'AGENTS.md'
      - 'LICENSE'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# A non-placeholder secret (the prod guard in lib/auth.ts throws on known placeholders).
env:
  NEXTAUTH_SECRET: ci-secret-not-a-placeholder-0123456789abcdef
  NEXTAUTH_URL: http://localhost:3000
  AUTH_TRUST_HOST: 'true'

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flowspace
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowspace?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/flowspace?schema=public
      # Integration tests truncate between runs, so they can target the same DB.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowspace?schema=public
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm lint:ci
      - name: Apply migrations
        run: pnpm db:deploy
      - run: pnpm test:unit
      - name: Integration tests (real Postgres)
        run: pnpm test:int
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flowspace
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowspace?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/flowspace?schema=public
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - name: Migrate + seed the e2e DB
        run: pnpm db:deploy && pnpm db:seed
      - run: pnpm exec playwright install --with-deps chromium
      - name: Build (the webServer runs `pnpm start`)
        run: pnpm build
      - run: pnpm e2e
